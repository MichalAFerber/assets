<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
  <link rel="stylesheet" href="{{ '/site/css/main.css' | relative_url }}">
  <script>
    // Site config for the gallery app
    window.SITE = {
      baseurl: {{ site.baseurl | jsonify }},
      siteUrl: {{ site.url | jsonify }},
      repo: {{ site.repo | jsonify }},
      branch: {{ site.branch | jsonify }},
      title: {{ site.title | jsonify }}
    };
    // Apply saved theme before first paint to avoid a flash
    (function () {
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <a class="site-logo" href="{{ '/' | relative_url }}">🎨 <span>{{ site.title }}</span></a>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark / light mode">🌗</button>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ site.time | date: "%Y" }} | Created with ❤️ by <a href="https://michalferber.dev">Michal Ferber, aka TechGuyWithABeard</a></p>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="{{ '/site/js/gallery.js' | relative_url }}"></script>
</body>
</html>
